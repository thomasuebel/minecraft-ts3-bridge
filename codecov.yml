coverage:
  status:
    project:
      default:
        target: auto      # never drop below current project coverage
        threshold: 1%     # allow up to 1% tolerance for noise
    patch:
      default:
        target: 80%       # new/changed lines must be 80% covered
        threshold: 5%     # allow some tolerance for untestable glue code

comment:
  layout: "reach,diff,files"
  behavior: default       # post on open, update on new commits
  require_changes: true   # only comment when coverage changes
